{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold text-pink-700 mb-6 flex items-center">
        <i class="fa-solid fa-lock mr-3"></i> 後台登入
    </h1>
    <form method="post" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-semibold text-gray-600 mb-1">帳號</label>
            <input id="username" name="username" type="text" required
                   class="w-full px-4 py-2 border border-pink-200 rounded focus:outline-none focus:ring-2 focus:ring-pink-400">
        </div>
        <div>
            <label for="password" class="block text-sm font-semibold text-gray-600 mb-1">密碼</label>
            <input id="password" name="password" type="password" required
                   class="w-full px-4 py-2 border border-pink-200 rounded focus:outline-none focus:ring-2 focus:ring-pink-400">
        </div>
        <button type="submit"
                class="w-full inline-flex justify-center items-center px-4 py-3 text-white font-semibold bg-pink-500 hover:bg-pink-600 rounded-lg transition">
            登入
        </button>
    </form>
</div>
{% endblock %}
