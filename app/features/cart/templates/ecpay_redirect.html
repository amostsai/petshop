{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-xl shadow p-8 text-center space-y-5">
    <div class="text-pink-500 text-5xl">
        <i class="fa-solid fa-credit-card"></i>
    </div>
    <h1 class="text-2xl font-bold text-pink-700">正在前往綠界付款</h1>
    <p class="text-gray-600">訂單 {{ order_number }} 已建立，請稍候。</p>
    <form id="ecpay-checkout-form" method="post" action="{{ checkout_url }}">
        {% for name, value in ecpay_params.items() %}
        <input type="hidden" name="{{ name }}" value="{{ value }}">
        {% endfor %}
        <button type="submit"
                class="inline-flex items-center px-5 py-3 bg-pink-500 hover:bg-pink-600 text-white font-semibold rounded-lg transition">
            前往付款
        </button>
    </form>
</div>
<script>
    window.addEventListener('DOMContentLoaded', function () {
        document.getElementById('ecpay-checkout-form').submit();
    });
</script>
{% endblock %}
