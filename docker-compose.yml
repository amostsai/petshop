services:
  mysql:
    image: mysql:8.0
    container_name: petshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: petshop
      MYSQL_USER: petshop
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      TZ: Asia/Taipei
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
      - ./env/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    secrets:
      - mysql_root_password
      - mysql_user_password

  flask:
    build:
      context: .
      dockerfile: ./env/flask/Dockerfile
    container_name: petshop-flask
    environment:
      FLASK_ENV: development
      FLASK_APP: app:create_app
      APP_ENV: development
      MYSQL_HOST: mysql
      MYSQL_DATABASE: petshop
      MYSQL_USER: petshop
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      ECPAY_CHECKOUT_URL: ${ECPAY_CHECKOUT_URL:-https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
      ECPAY_MERCHANT_ID: ${ECPAY_MERCHANT_ID:-3002607}
      ECPAY_HASH_KEY: ${ECPAY_HASH_KEY:-pwFHCqoQZGmho4w6}
      ECPAY_HASH_IV: ${ECPAY_HASH_IV:-EkRm7iFT261dpevs}
      ECPAY_RETURN_URL: ${ECPAY_RETURN_URL:-}
      ECPAY_CLIENT_BACK_URL: ${ECPAY_CLIENT_BACK_URL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      TZ: Asia/Taipei
    volumes:
      - ./app:/app
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    secrets:
      - mysql_user_password
      - flask_secret_key

  nginx:
    image: nginx:alpine
    container_name: petshop-nginx
    ports:
      - "80:80"
    volumes:
      - ./env/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/static
    depends_on:
      - flask

  pytest:
    build:
      context: .
      dockerfile: ./env/flask/Dockerfile
    container_name: petshop-pytest
    environment:
      APP_ENV: testing
      FLASK_ENV: testing
      MYSQL_HOST: mysql
      MYSQL_DATABASE: petshop
      MYSQL_USER: petshop
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      ECPAY_CHECKOUT_URL: ${ECPAY_CHECKOUT_URL:-https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
      ECPAY_MERCHANT_ID: ${ECPAY_MERCHANT_ID:-3002607}
      ECPAY_HASH_KEY: ${ECPAY_HASH_KEY:-pwFHCqoQZGmho4w6}
      ECPAY_HASH_IV: ${ECPAY_HASH_IV:-EkRm7iFT261dpevs}
      ECPAY_RETURN_URL: ${ECPAY_RETURN_URL:-}
      ECPAY_CLIENT_BACK_URL: ${ECPAY_CLIENT_BACK_URL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      TZ: Asia/Taipei
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["pytest"]
    depends_on:
      - mysql
    secrets:
      - mysql_user_password
      - flask_secret_key
    profiles:
      - test

volumes:
  mysql:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_user_password:
    file: ./secrets/mysql_user_password.txt
  flask_secret_key:
    file: ./secrets/flask_secret_key.txt
